---
# ArgoCD Application with proxy annotations — tests the ArgoCD watcher.
# The operator will create a SynologyProxyRule named "nginx-argo" automatically.
# Adjust repoURL / path to a repo you have access to (or use any public chart).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nginx-argo
  namespace: argocd
  annotations:
    synology.proxy/enabled: "true"
    synology.proxy/source-host: "nginx-argo.local.example.com"
    synology.proxy/destination-protocol: "http"
    # No service-ref or destination-host: operator will auto-scan nginx-test namespace.
spec:
  project: default
  source:
    repoURL: https://charts.bitnami.com/bitnami
    chart: nginx
    targetRevision: "*"
  destination:
    server: https://kubernetes.default.svc
    namespace: nginx-test
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
