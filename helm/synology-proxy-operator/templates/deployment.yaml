apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "synology-proxy-operator.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "synology-proxy-operator.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "synology-proxy-operator.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "synology-proxy-operator.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "synology-proxy-operator.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: manager
          image: {{ include "synology-proxy-operator.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - "--leader-elect={{ .Values.leaderElection }}"
            - "--default-domain={{ .Values.operator.defaultDomain }}"
            - "--default-acl-profile={{ .Values.operator.defaultACLProfile }}"
            - "--enable-argo-watcher={{ .Values.operator.enableArgoWatcher }}"
            - "--watch-namespace={{ .Values.operator.watchNamespace }}"
            - "--rule-namespace={{ .Values.operator.ruleNamespace }}"
            - "--disable-auto-discovery-if-spr-exists={{ .Values.operator.disableAutoDiscoveryIfSPRExists }}"
            - "--synology-skip-tls-verify={{ .Values.synology.skipTLSVerify }}"
            {{- range .Values.operator.extraArgs }}
            - {{ . | quote }}
            {{- end }}
          env:
            - name: SYNOLOGY_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "synology-proxy-operator.secretName" . }}
                  key: SYNOLOGY_URL
            - name: SYNOLOGY_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "synology-proxy-operator.secretName" . }}
                  key: SYNOLOGY_USER
            - name: SYNOLOGY_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "synology-proxy-operator.secretName" . }}
                  key: SYNOLOGY_PASSWORD
          ports:
            - name: metrics
              containerPort: 8080
              protocol: TCP
            - name: health
              containerPort: 8081
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      terminationGracePeriodSeconds: 10
