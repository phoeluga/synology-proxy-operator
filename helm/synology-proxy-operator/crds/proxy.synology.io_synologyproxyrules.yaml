---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: synologyproxyrules.proxy.synology.io
  annotations:
    controller-gen.kubebuilder.io/version: v0.16.1
spec:
  group: proxy.synology.io
  names:
    kind: SynologyProxyRule
    listKind: SynologyProxyRuleList
    plural: synologyproxyrules
    singular: synologyproxyrule
    shortNames:
      - spr
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Source Host
          type: string
          jsonPath: .spec.sourceHost
        - name: Destination
          type: string
          jsonPath: .status.resolvedDestinationHost
        - name: Synced
          type: boolean
          jsonPath: .status.synced
        - name: UUID
          type: string
          jsonPath: .status.uuid
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          description: >
            SynologyProxyRule represents one reverse proxy entry managed
            in Synology DSM. Create one per service you want to expose.
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              required:
                - sourceHost
              properties:
                sourceHost:
                  type: string
                  description: Public FQDN the reverse proxy listens on (frontend).
                sourcePort:
                  type: integer
                  default: 443
                  description: HTTPS port the reverse proxy listens on.
                destinationHost:
                  type: string
                  description: >
                    Backend IP or hostname. Auto-discovered when empty
                    (requires serviceRef, ingressRef, or a LoadBalancer in the namespace).
                destinationPort:
                  type: integer
                  description: Backend port. Auto-discovered when 0.
                destinationProtocol:
                  type: string
                  default: http
                  enum: [http, https]
                  description: Backend protocol.
                aclProfile:
                  type: string
                  description: Synology Access Control Profile name.
                assignCertificate:
                  type: boolean
                  default: true
                  description: >
                    Automatically assign the best matching certificate from DSM.
                customHeaders:
                  type: array
                  description: >
                    HTTP headers injected into every proxied request.
                    Defaults to WebSocket upgrade headers when omitted.
                  items:
                    type: object
                    required: [name, value]
                    properties:
                      name:
                        type: string
                      value:
                        type: string
                serviceRef:
                  type: object
                  description: LoadBalancer Service to use for backend auto-discovery.
                  required: [name]
                  properties:
                    name:
                      type: string
                    namespace:
                      type: string
                ingressRef:
                  type: object
                  description: Ingress to use for backend auto-discovery (fallback after serviceRef).
                  required: [name]
                  properties:
                    name:
                      type: string
                    namespace:
                      type: string
                timeouts:
                  type: object
                  description: Per-proxy TCP/HTTP timeouts (seconds).
                  properties:
                    connect:
                      type: integer
                      default: 60
                    read:
                      type: integer
                      default: 60
                    send:
                      type: integer
                      default: 60
                description:
                  type: string
                  description: Human-readable label stored on the DSM record.
                managedByApp:
                  type: string
                  description: ArgoCD Application name that owns this rule (set automatically).
            status:
              type: object
              properties:
                uuid:
                  type: string
                synced:
                  type: boolean
                lastSyncTime:
                  type: string
                  format: date-time
                resolvedDestinationHost:
                  type: string
                resolvedDestinationPort:
                  type: integer
                conditions:
                  type: array
                  items:
                    type: object
                    required: [lastTransitionTime, message, reason, status, type]
                    properties:
                      lastTransitionTime:
                        type: string
                        format: date-time
                      message:
                        type: string
                      observedGeneration:
                        type: integer
                        format: int64
                      reason:
                        type: string
                      status:
                        type: string
                      type:
                        type: string
