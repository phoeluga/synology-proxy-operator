{{- if .Values.metrics.enabled -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "synology-proxy-operator.fullname" . }}-metrics
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "synology-proxy-operator.labels" . | nindent 4 }}
  {{- with .Values.metrics.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.metrics.service.type }}
  ports:
  - port: {{ .Values.metrics.service.port }}
    targetPort: metrics
    protocol: TCP
    name: metrics
  selector:
    {{- include "synology-proxy-operator.selectorLabels" . | nindent 4 }}
{{- end }}
