# Default values for synology-proxy-operator

# Operator image configuration
image:
  repository: ghcr.io/phoeluga/synology-proxy-operator
  tag: "0.1.0"
  pullPolicy: IfNotPresent

# Image pull secrets for private registries
imagePullSecrets: []

# Synology NAS configuration
synology:
  # URL of the Synology NAS (required)
  url: ""
  
  # Name of the Secret containing Synology credentials
  secretName: synology-credentials
  
  # Namespace of the credentials Secret (defaults to release namespace)
  secretNamespace: ""
  
  # TLS verification
  tlsVerify: true
  
  # Path to CA certificate for TLS verification (optional)
  caCertPath: ""
  
  # Default ACL profile to use (optional)
  defaultACLProfile: ""
  
  # Maximum number of retries for API calls
  maxRetries: 3
  
  # Retry delay (duration string, e.g., "1s", "500ms")
  retryDelay: "1s"
  
  # API request timeout (duration string)
  timeout: "30s"

# Operator configuration
operator:
  # Namespaces to watch (comma-separated patterns or "*" for all)
  watchNamespaces: "*"
  
  # Log level (debug, info, warn, error)
  logLevel: info
  
  # Log format (json, console)
  logFormat: json

# Resource limits and requests
resources:
  requests:
    memory: "128Mi"
    cpu: "100m"
  limits:
    memory: "256Mi"
    cpu: "500m"

# Metrics configuration
metrics:
  enabled: true
  port: 8080
  service:
    type: ClusterIP
    port: 8080
    annotations: {}

# Health probe configuration
health:
  port: 8081
  livenessProbe:
    enabled: true
    initialDelaySeconds: 15
    periodSeconds: 20
    timeoutSeconds: 5
    failureThreshold: 3
  readinessProbe:
    enabled: true
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3

# RBAC configuration
rbac:
  create: true

# Service account configuration
serviceAccount:
  create: true
  # Name of the service account (auto-generated if empty)
  name: ""
  annotations: {}

# Pod annotations
podAnnotations: {}

# Pod security context
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  fsGroup: 65532

# Container security context
securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
    - ALL
  readOnlyRootFilesystem: true

# Node selector
nodeSelector: {}

# Tolerations
tolerations: []

# Affinity
affinity: {}

# Number of replicas (currently only 1 is supported)
replicaCount: 1

# Name override
nameOverride: ""
fullnameOverride: ""
