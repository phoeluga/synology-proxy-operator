name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

# Cancel any in-progress run for the same branch/PR when a new push arrives.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Verify dependencies
        run: go mod verify

      - name: Run go vet
        run: go vet ./...

      - name: Run tests
        run: go test ./... -v -coverprofile=coverage.out

      - name: Upload coverage
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage.out

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.4
          args: --timeout=5m

  helm-lint:
    name: Helm Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Lint Helm chart
        run: helm lint helm/synology-proxy-operator --strict

  docker-build:
    name: Docker Build (no push)
    runs-on: ubuntu-latest
    # For PRs and push-to-main: build but do not push.
    # The release workflow (on tag push) does the actual push to GHCR.
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image (no push)
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          tags: ghcr.io/phoeluga/synology-proxy-operator:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Push :main to GHCR on every merge to main (pre-release convenience tag).
  # The :latest tag is reserved for tagged releases via the release workflow.
  push-main:
    name: Push :main to GHCR
    runs-on: ubuntu-latest
    needs: [test, lint, helm-lint, docker-build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@v4

      - name: Build and push :main
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ghcr.io/phoeluga/synology-proxy-operator:main
          provenance: false
          sbom: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Delete untagged digests
        uses: actions/delete-package-versions@v5
        with:
          package-name: synology-proxy-operator
          package-type: container
          delete-only-untagged-versions: true
