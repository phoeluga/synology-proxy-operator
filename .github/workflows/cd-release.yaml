name: Release

on:
  push:
    tags:
      - "v*"

# One release per tag — don't cancel if two tags are pushed simultaneously.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  ci:
    uses: ./.github/workflows/ci.yaml

  release:
    name: Build & Push Docker image + Helm chart
    needs: [ci]
    runs-on: ubuntu-latest
    permissions:
      contents: write    # Upload release assets
      packages: write    # Push to GHCR
      id-token: write    # OIDC for cosign keyless signing

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v5

      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push linux/amd64
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}-amd64
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push linux/arm64
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}-arm64
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create and push manifest index
        id: manifest
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          MINOR="${VERSION%.*}"
          docker buildx imagetools create \
            --tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${VERSION} \
            --tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${MINOR} \
            --tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${VERSION}-amd64 \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${VERSION}-arm64
          DIGEST=$(docker buildx imagetools inspect ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${VERSION} --format '{{json .Manifest}}' | jq -r '.digest')
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign container image (keyless)
        run: |
          cosign sign --yes \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.manifest.outputs.digest }}

      # ── Helm chart release ────────────────────────────────────────────────
      - name: Update chart version to match tag
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          sed -i "s/^appVersion:.*/appVersion: \"${VERSION}\"/" helm/synology-proxy-operator/Chart.yaml
          sed -i "s/^version:.*/version: ${VERSION}/" helm/synology-proxy-operator/Chart.yaml
          cp README.md helm/synology-proxy-operator/README.md

      - name: Package Helm chart
        run: |
          mkdir -p dist
          helm package helm/synology-proxy-operator --destination dist/

      - name: Push Helm chart to GHCR (OCI)
        run: |
          helm push dist/*.tgz oci://ghcr.io/phoeluga/charts

      - name: Install crane
        uses: imjasonh/setup-crane@v0.4

      - name: Sign Helm chart (keyless)
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          CHART_REF="ghcr.io/phoeluga/charts/synology-proxy-operator"
          DIGEST=$(crane digest "${CHART_REF}:${VERSION}")
          cosign sign --yes "${CHART_REF}@${DIGEST}"

      - name: Upload Helm chart to GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.ref_name }}" dist/*.tgz
