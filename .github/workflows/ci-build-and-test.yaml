name: CI-BuildAndTest

on:
  workflow_call:
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Verify dependencies
        run: go mod verify

      - name: Run go vet
        run: go vet ./...

      - name: Run tests
        run: go test ./... -v -coverprofile=coverage.out

      - name: Upload coverage
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage.out

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.4
          args: --timeout=5m

  helm-lint:
    name: Helm Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Helm
        uses: azure/setup-helm@v5

      - name: Lint Helm chart
        run: helm lint helm/synology-proxy-operator --strict

      - name: Check values.schema.json covers all values.yaml keys
        run: |
          CHART_DIR="helm/synology-proxy-operator"

          # Extract top-level keys from values.yaml
          VALUES_KEYS=$(yq -r 'keys | .[]' "${CHART_DIR}/values.yaml")

          # Extract top-level property names from values.schema.json
          SCHEMA_KEYS=$(jq -r '.properties | keys[]' "${CHART_DIR}/values.schema.json")

          MISSING=""
          for key in ${VALUES_KEYS}; do
            if ! echo "${SCHEMA_KEYS}" | grep -qxF "${key}"; then
              MISSING="${MISSING}\n  - ${key}"
            fi
          done

          if [ -n "${MISSING}" ]; then
            echo "::error::values.schema.json is missing top-level keys from values.yaml:${MISSING}"
            echo ""
            echo "Add the missing keys to ${CHART_DIR}/values.schema.json"
            exit 1
          fi

          # Also check nested keys for objects that have sub-properties
          for key in ${VALUES_KEYS}; do
            SUB_KEYS=$(yq -r ".${key} | if type == \"object\" then keys | .[] else empty end" "${CHART_DIR}/values.yaml" 2>/dev/null)
            SCHEMA_SUB=$(jq -r ".properties.${key}.properties // {} | keys[]" "${CHART_DIR}/values.schema.json" 2>/dev/null)
            for sub in ${SUB_KEYS}; do
              if ! echo "${SCHEMA_SUB}" | grep -qxF "${sub}"; then
                MISSING="${MISSING}\n  - ${key}.${sub}"
              fi
            done
          done

          if [ -n "${MISSING}" ]; then
            echo "::error::values.schema.json is missing keys from values.yaml:${MISSING}"
            echo ""
            echo "Add the missing keys to ${CHART_DIR}/values.schema.json"
            exit 1
          fi
          echo "All values.yaml keys are covered by values.schema.json"

  docker-build:
    name: Docker Build (no push)
    runs-on: ubuntu-latest
    # For PRs and push-to-main: build but do not push.
    # The release workflow (on tag push) does the actual push to GHCR.
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image (no push)
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

