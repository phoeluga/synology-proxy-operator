name: CI-BuildAndTest

on:
  workflow_call:
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Verify dependencies
        run: go mod verify

      - name: Run go vet
        run: go vet ./...

      - name: Install setup-envtest
        run: go install sigs.k8s.io/controller-runtime/tools/setup-envtest@latest

      - name: Run tests
        run: |
          KUBEBUILDER_ASSETS="$(setup-envtest use 1.32.x --bin-dir /tmp/envtest -p path)"
          export KUBEBUILDER_ASSETS
          go test ./... -v -coverprofile=coverage.out

      - name: Upload coverage
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage.out

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.4
          args: --timeout=5m

  helm-lint:
    name: Helm Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Helm
        uses: azure/setup-helm@v5

      - name: Lint Helm chart
        run: helm lint helm/synology-proxy-operator --strict

      - name: Check values.schema.json covers all values.yaml keys
        run: |
          python3 - <<'PYEOF'
          import json, sys, re

          chart_dir = "helm/synology-proxy-operator"

          with open(f"{chart_dir}/values.yaml") as f:
              content = f.read()

          with open(f"{chart_dir}/values.schema.json") as f:
              schema = json.load(f)

          schema_props = schema.get("properties", {})

          # Top-level keys: lines starting at column 0 with "key:" syntax
          top_keys = []
          for line in content.splitlines():
              m = re.match(r'^([a-zA-Z][a-zA-Z0-9_-]*):', line)
              if m:
                  top_keys.append(m.group(1))

          # Sub-keys: lines with exactly 2-space indent under each top-level key
          def get_sub_keys(key):
              in_section = False
              sub_keys = []
              for line in content.splitlines():
                  if re.match(rf'^{re.escape(key)}:', line):
                      in_section = True
                      continue
                  if in_section:
                      if re.match(r'^[a-zA-Z#]', line):
                          break
                      m = re.match(r'^  ([a-zA-Z][a-zA-Z0-9_-]*):', line)
                      if m:
                          sub_keys.append(m.group(1))
              return sub_keys

          missing = []

          for key in top_keys:
              if key not in schema_props:
                  missing.append(key)

          if missing:
              print("::error::values.schema.json is missing top-level keys from values.yaml:")
              for m in missing:
                  print(f"  - {m}")
              print(f"\nAdd the missing keys to {chart_dir}/values.schema.json")
              sys.exit(1)

          for key in top_keys:
              sub_keys = get_sub_keys(key)
              schema_sub = set((schema_props.get(key, {}).get("properties") or {}).keys())
              for sub in sub_keys:
                  if sub not in schema_sub:
                      missing.append(f"{key}.{sub}")

          if missing:
              print("::error::values.schema.json is missing nested keys from values.yaml:")
              for m in missing:
                  print(f"  - {m}")
              print(f"\nAdd the missing keys to {chart_dir}/values.schema.json")
              sys.exit(1)

          print("All values.yaml keys are covered by values.schema.json")
          PYEOF

  docker-build:
    name: Docker Build (no push)
    runs-on: ubuntu-latest
    # For PRs and push-to-main: build but do not push.
    # The release workflow (on tag push) does the actual push to GHCR.
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image (no push)
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

