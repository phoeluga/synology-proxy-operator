name: Publish

# Runs after CI passes on main — publishes the :main dev image.
# Keeps CD concerns separate from CI (build/test/lint).
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

jobs:
  push-main:
    name: Push :main to GHCR
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@v4

      - name: Build and push :main-amd64
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ghcr.io/phoeluga/synology-proxy-operator:main-amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push :main-arm64
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: ghcr.io/phoeluga/synology-proxy-operator:main-arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create and push :main manifest index
        run: |
          docker buildx imagetools create \
            --tag ghcr.io/phoeluga/synology-proxy-operator:main \
            ghcr.io/phoeluga/synology-proxy-operator:main-amd64 \
            ghcr.io/phoeluga/synology-proxy-operator:main-arm64
