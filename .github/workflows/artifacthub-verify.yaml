name: ArtifactHub Ownership Verification

on:
  workflow_dispatch:
    inputs:
      repository_id:
        description: "ArtifactHub Repository ID (UUID from Control Panel)"
        required: true
      owner_name:
        description: "ArtifactHub owner name"
        required: true
      owner_email:
        description: "ArtifactHub owner email (optional)"
        required: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  push-ownership-file:
    name: Push artifacthub-repo.yml to GHCR
    runs-on: ubuntu-latest
    permissions:
      packages: write

    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up ORAS
        uses: oras-project/setup-oras@v1.2.4

      - name: Build and push artifacthub-repo.yml
        env:
          REPO_ID: ${{ inputs.repository_id }}
          OWNER_NAME: ${{ inputs.owner_name }}
          OWNER_EMAIL: ${{ inputs.owner_email }}
        run: |
          {
            echo "repositoryID: ${REPO_ID}"
            echo "owners:"
            echo "  - name: ${OWNER_NAME}"
            if [ -n "${OWNER_EMAIL}" ]; then
              echo "    email: ${OWNER_EMAIL}"
            fi
          } > artifacthub-repo.yml

          cat artifacthub-repo.yml

          oras push ghcr.io/phoeluga/charts/synology-proxy-operator/artifacthub-repo:latest \
            --config /dev/null:application/vnd.oci.image.config.v1+json \
            artifacthub-repo.yml:application/vnd.cncf.artifacthub.repository-metadata.layer.v1.yaml
