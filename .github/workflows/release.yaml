name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  packages: write

jobs:
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    #- name: Set up Docker Buildx
    #  uses: docker/setup-buildx-action@v3
    
    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    
    # - name: Extract metadata
    #   id: meta
    #   uses: docker/metadata-action@v5
    #   with:
    #     images: ghcr.io/${{ github.repository }}
    #     tags: |
    #       type=semver,pattern={{version}}
    #       type=semver,pattern={{major}}.{{minor}}
    #       type=semver,pattern={{major}}
    #       type=sha
    
    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        platforms: linux/amd64,linux/arm64
        push: true
        tags: |
            ghcr.io/${{ github.repository_owner }}/synology-proxy-operator:latest
            ghcr.io/${{ github.repository_owner }}/synology-proxy-operator:${{ github.sha }}
        #tags: ${{ steps.meta.outputs.tags }}
        #labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
  
  release:
    name: Create GitHub Release
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.21'
    
    - name: Build binaries
      run: |
        mkdir -p dist
        GOOS=linux GOARCH=amd64 go build -o dist/synology-proxy-operator-linux-amd64 main.go
        GOOS=linux GOARCH=arm64 go build -o dist/synology-proxy-operator-linux-arm64 main.go
        GOOS=darwin GOARCH=amd64 go build -o dist/synology-proxy-operator-darwin-amd64 main.go
        GOOS=darwin GOARCH=arm64 go build -o dist/synology-proxy-operator-darwin-arm64 main.go
        GOOS=windows GOARCH=amd64 go build -o dist/synology-proxy-operator-windows-amd64.exe main.go
    
    - name: Create checksums
      run: |
        cd dist
        sha256sum * > checksums.txt
    
    - name: Package Helm chart
      run: |
        helm package charts/synology-proxy-operator -d dist/
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        generate_release_notes: true
        files: |
          dist/*
        body: |
          ## Installation
          
          ### Helm Chart
          ```bash
          helm install synology-operator oci://ghcr.io/${{ github.repository }}/charts/synology-proxy-operator --version ${{ github.ref_name }}
          ```
          
          ### Docker Image
          ```bash
          docker pull ghcr.io/${{ github.repository }}:${{ github.ref_name }}
          ```
          
          ### Binary
          Download the appropriate binary for your platform from the assets below.
          
          ## What's Changed
          See the full changelog below.
