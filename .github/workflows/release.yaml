name: Release

on:
  push:
    tags:
      - "v*"

# One release per tag — don't cancel if two tags are pushed simultaneously.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  release:
    name: Build & Push Docker image + Helm chart
    runs-on: ubuntu-latest
    permissions:
      contents: write    # Create GitHub Release
      packages: write    # Push to GHCR (private packages allowed)
      id-token: write    # OIDC for signing (future use)

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: go test ./...

      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Helm chart release ────────────────────────────────────────────────
      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Update chart version to match tag
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          sed -i "s/^appVersion:.*/appVersion: \"${TAG}\"/" helm/synology-proxy-operator/Chart.yaml
          sed -i "s/^version:.*/version: ${TAG}/" helm/synology-proxy-operator/Chart.yaml
          # Also update default image tag in values.yaml
          sed -i "s|ghcr.io/phoeluga/synology-proxy-operator|${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}|" config/manager/deployment.yaml

      - name: Package Helm chart
        run: |
          mkdir -p dist
          helm package helm/synology-proxy-operator --destination dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.tgz
          generate_release_notes: true
          # Release is private by default for private repos.
          # Set make_latest: true when you're ready to go public.
          make_latest: "false"
