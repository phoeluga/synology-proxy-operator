name: Release

on:
  push:
    tags:
      - "v*"

# One release per tag — don't cancel if two tags are pushed simultaneously.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  release:
    name: Build & Push Docker image + Helm chart
    runs-on: ubuntu-latest
    permissions:
      contents: write    # Create GitHub Release
      packages: write    # Push to GHCR (private packages allowed)
      id-token: write    # OIDC for signing (future use)

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: go test ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.4
          args: --timeout=5m

      - name: Set up Helm
        uses: azure/setup-helm@v5

      - name: Lint Helm chart
        run: helm lint helm/synology-proxy-operator --strict

      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
          sbom: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Helm chart release ────────────────────────────────────────────────
      - name: Update chart version to match tag
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          sed -i "s/^appVersion:.*/appVersion: \"${TAG}\"/" helm/synology-proxy-operator/Chart.yaml
          sed -i "s/^version:.*/version: ${TAG}/" helm/synology-proxy-operator/Chart.yaml
          cp README.md helm/synology-proxy-operator/README.md

      - name: Package Helm chart
        run: |
          mkdir -p dist
          helm package helm/synology-proxy-operator --destination dist/

      - name: Push Helm chart to GHCR (OCI)
        run: |
          helm push dist/*.tgz oci://ghcr.io/phoeluga/charts

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --generate-notes \
            --latest \
            dist/*.tgz

      - name: Delete untagged digests
        uses: actions/delete-package-versions@v5
        with:
          package-name: synology-proxy-operator
          package-type: container
          delete-only-untagged-versions: true
