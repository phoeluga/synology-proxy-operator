apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: synology-proxy-operator
  labels:
    app.kubernetes.io/name: synology-proxy-operator
    app.kubernetes.io/component: rbac
rules:
  # Ingress resources - read, watch, update status
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list", "watch", "update", "patch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses/status"]
    verbs: ["update", "patch"]
  
  # Events - create for user notifications
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
  
  # Secrets - read credentials (specific secret only)
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "watch"]
    resourceNames: ["synology-credentials"]
  
  # Namespaces - list for filtering
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["list"]
