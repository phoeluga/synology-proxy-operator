---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: synology-proxy-operator
  namespace: synology-proxy-operator
  labels:
    app: synology-proxy-operator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: synology-proxy-operator
  template:
    metadata:
      labels:
        app: synology-proxy-operator
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      serviceAccountName: synology-proxy-operator
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: manager
          image: ghcr.io/phoeluga/synology-proxy-operator:latest
          imagePullPolicy: IfNotPresent
          args:
            - --leader-elect
            - --operator-namespace=$(POD_NAMESPACE)
          env:
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          ports:
            - name: metrics
              containerPort: 8080
              protocol: TCP
            - name: health
              containerPort: 8081
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            limits:
              cpu: 500m
              memory: 128Mi
            requests:
              cpu: 10m
              memory: 64Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      terminationGracePeriodSeconds: 10
