apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# All resources deployed by ArgoCD from this path.
# Order matters: CRD → RBAC → ConfigMap → Deployment
resources:
  - crd/bases/proxy.synology.io_synologyproxyrules.yaml
  - rbac/service_account.yaml
  - rbac/role.yaml
  - rbac/role_binding.yaml
  - manager/configmap.yaml
  - manager/deployment.yaml
