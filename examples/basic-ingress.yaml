apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: grafana
  namespace: production
  annotations:
    # Enable Synology Proxy Operator management
    synology.io/enabled: "true"
spec:
  rules:
  - host: grafana.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: grafana
            port:
              number: 3000
