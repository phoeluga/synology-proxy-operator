apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: internal-app
  namespace: production
  annotations:
    # Enable Synology Proxy Operator management
    synology.io/enabled: "true"
    # Override default ACL profile
    synology.io/acl-profile: "InternalOnly"
spec:
  rules:
  - host: internal.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: internal-app
            port:
              number: 8080
