apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: legacy-app
  namespace: production
  annotations:
    # Enable Synology Proxy Operator management
    synology.io/enabled: "true"
    # Retain proxy record when Ingress is deleted
    synology.io/deletion-policy: "retain"
spec:
  rules:
  - host: legacy.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: legacy-app
            port:
              number: 80
