apiVersion: v1
kind: Secret
metadata:
  name: synology-credentials
  namespace: synology-operator
type: Opaque
stringData:
  # Replace with your Synology admin credentials
  username: admin
  password: your-synology-password-here
---
# Example: Using existing secret from different namespace
# If you already have credentials stored elsewhere, reference them in Helm values:
# 
# synology:
#   secretName: my-existing-secret
#   secretNamespace: my-namespace
